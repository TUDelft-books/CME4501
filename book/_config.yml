title: CME4501
author: Tom van Woudenberg and Maria Nogal from Delft University of Technology, built with <a href="https://teachbooks.tudelft.nl/">TeachBooks</a> and <a href="https://jupyterbook.org/">Jupyter Book</a>, <a href="https://creativecommons.org/licenses/by/4.0/?ref=chooser-v1" target="_blank" rel="license noopener noreferrer"">CC BY 4.0<img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/cc.svg?ref=chooser-v1" alt=""><img style="height:22px!important;margin-left:3px;vertical-align:text-bottom;" src="https://mirrors.creativecommons.org/presskit/icons/by.svg?ref=chooser-v1" alt=""></a>
email: T.R.vanWoudenberg@tudelft.nl 

only_build_toc_files : True

execute:
  execute_notebooks: 'off'

html:
  favicon : "pages/figures/favicon.ico"
  baseurl :  "https://oit.tudelft.nl/CME4501/2024"
  home_page_in_navbar       : true

sphinx:
  config:
    bibtex_reference_style: author_year
    html_js_files:
    - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js
    thebe_config:
      use_thebe_lite: true
      exclude_patterns: ["**/_*.yml", "**/*.md", "**/*.ipynb","**/**"]      
    html_theme_options:
      repository_url: "https://github.com/TUDelft-books/CME4501"
      path_to_docs: "book"
      repository_branch: "2024"
      use_repository_button: true
      use_edit_page_button: true
      use_issues_button : true
      launch_buttons:
        thebe: true
      logo:
        text: "CME4501"
    html_show_copyright: false
    html_last_updated_fmt: '%B %-d, %Y'
    mathjax3_config:
      chtml: {
        mtextInheritFont: true # To typeset text within math prettier
      }
  extra_extensions:
    - download_link_replacer
    - jupyterbook_patches
    - download_link_replacer
    - sphinx.ext.extlinks
    - sphinx_image_inverter
    - sphinx_exercise
    - sphinx_tudelft_theme

bibtex_bibfiles:
  - references.bib