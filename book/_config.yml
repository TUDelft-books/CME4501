title: CME4501 - Engineering Systems Optimization
author: Tom van Woudenberg and Maria Nogal from Delft University of Technology.
email: T.R.vanWoudenberg@tudelft.nl 

only_build_toc_files : True

execute:
  execute_notebooks: 'off'

html:
  baseurl :  "https://oit.tudelft.nl/CME4501/2025"
  home_page_in_navbar       : true

sphinx:
  config:
    bibtex_reference_style: author_year
    html_js_files:
    - https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.4/require.min.js
    thebe_config:
      use_thebe_lite: true
      exclude_patterns: ["**/*.md","**/*.png","**/*.svg","**/*.jpeg","**/*.png","**/*.html"]      
    html_theme_options:
      repository_url: "https://github.com/TUDelft-books/CME4501"
      path_to_docs: "book"
      repository_branch: "2025"
      use_repository_button: true
      use_edit_page_button: true
      use_issues_button : true
      launch_buttons:
        thebe: true
      logo:
        text: "CME4501 - Engineering Systems Optimization"
    html_show_copyright: false
    html_last_updated_fmt: ''
    tud_change_titlesize: false
    mathjax3_config:
      chtml: {
        mtextInheritFont: true # To typeset text within math prettier
      }
  extra_extensions:
    - teachbooks_favourites                          # Gives you a starter package of extensions to use in your open interactive learning material, replace with individual extensions if you prefer some extensions not to be included (https://github.com/TeachBooks/TeachBooks-Favourites)
    - sphinx_tudelft_theme                           # Add TU Delft theme: https://teachbooks.io/manual/external/Sphinx-TUDelft-theme/README.html
    - sphinx_apa_references 

bibtex_bibfiles:
  - references.bib
